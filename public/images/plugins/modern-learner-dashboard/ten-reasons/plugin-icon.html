<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plugin icon — Modern Learner Dashboard</title>
<!--
  On-brand marketplace/app icon for block_modernlearnerdashboard — agunfon brand.
  Render the .icon element to PNG at 512x512. Central glyph = dashboard tiles
  (the classic "dashboard" layout mark) to read instantly as a learner dashboard.
-->
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#fff;}
  .icon{position:relative;width:512px;height:512px;border-radius:112px;overflow:hidden;
    background:linear-gradient(140deg,#4B8BE8 0%,#0F3D7A 100%);
    display:flex;align-items:center;justify-content:center;}
  /* soft highlight + decorative ring */
  .icon::before{content:"";position:absolute;top:-120px;left:-80px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent 60%);}
  .ring{position:absolute;width:520px;height:520px;border-radius:50%;border:34px solid rgba(255,255,255,.06);
    right:-180px;bottom:-180px;}
  /* dashboard-tiles glyph */
  .glyph{position:relative;z-index:1;width:230px;height:230px;color:#fff;filter:drop-shadow(0 18px 30px rgba(6,24,51,.45));}
</style>
</head>
<body>
  <div class="icon">
    <div class="ring"></div>
    <svg class="glyph" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <rect x="3"  y="3"  width="7.5" height="11" rx="1.6"/>
      <rect x="3"  y="16" width="7.5" height="5"  rx="1.6"/>
      <rect x="13.5" y="3"  width="7.5" height="5"  rx="1.6"/>
      <rect x="13.5" y="10" width="7.5" height="11" rx="1.6"/>
    </svg>
  </div>
</body>
</html>
