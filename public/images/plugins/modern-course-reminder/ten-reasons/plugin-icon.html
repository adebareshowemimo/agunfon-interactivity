<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plugin icon — Modern Course Reminder</title>
<!--
  On-brand marketplace/app icon for Modern Course Reminder — agunfon brand.
  Render the .icon element to PNG at 512x512. Bell glyph (reminder) over a
  course-progress hint bar. Keeps the agunfon gradient/ring/highlight.
-->
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:transparent;}
  .icon{position:relative;width:512px;height:512px;border-radius:112px;overflow:hidden;
    background:linear-gradient(140deg,#4B8BE8 0%,#0F3D7A 100%);
    display:flex;align-items:center;justify-content:center;}
  /* soft highlight + decorative ring */
  .icon::before{content:"";position:absolute;top:-120px;left:-80px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent 60%);}
  .ring{position:absolute;width:520px;height:520px;border-radius:50%;border:34px solid rgba(255,255,255,.06);
    right:-180px;bottom:-180px;}
  /* bell glyph */
  .glyph{position:relative;z-index:1;width:208px;height:208px;color:#fff;margin-top:-26px;
    filter:drop-shadow(0 18px 30px rgba(6,24,51,.45));}
  /* course-progress hint */
  .bar{position:absolute;left:96px;right:96px;bottom:118px;height:14px;border-radius:999px;background:rgba(255,255,255,.25);z-index:1;}
  .bar i{display:block;height:100%;width:68%;border-radius:999px;background:#fff;}
</style>
</head>
<body>
  <div class="icon">
    <div class="ring"></div>
    <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
      <path d="M22 8c0-2.3-.8-4.3-2-6"/>
      <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>
      <path d="M4 2C2.8 3.7 2 5.7 2 8"/>
    </svg>
    <div class="bar"><i></i></div>
  </div>
</body>
</html>
